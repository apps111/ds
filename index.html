<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Sertifikat | Komunitas Belajar Inspirasi Depan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            font-family: 'Roboto', sans-serif;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: screen;
        }

        /* Hidden Certificate for Rendering */
        #render-area {
            position: absolute;
            left: -9999px;
            top: -9999px;
        }

        #certificate-wrapper {
            width: 1123px; /* A4 Landscape */
            height: 794px;
            background-color: white;
            position: relative;
            color: #000;
            overflow: hidden;
        }

        .canva-bg {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }

        .content-layer {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100%;
        }

        .name-container {
            position: absolute;
            top: 45%; 
            width: 100%;
            text-align: center;
        }

        .cert-name {
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            font-size: 48px;
            color: #1e3a8a;
            text-transform: uppercase;
        }

        .barcode-pos {
            position: absolute;
            bottom: 60px;
            left: 80px;
        }

        .btn-gradient {
            background: linear-gradient(to right, #2563eb, #1d4ed8);
            transition: all 0.3s ease;
        }
        .btn-gradient:hover {
            background: linear-gradient(to right, #3b82f6, #2563eb);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -10px rgba(59, 130, 246, 0.5);
        }
    </style>
</head>
<body class="min-h-screen py-10 px-4 flex items-center justify-center">

    <div class="max-w-md w-full mx-auto">
        <!-- Main Panel -->
        <div class="bg-white/10 backdrop-blur-xl p-10 rounded-[2.5rem] border border-white/20 shadow-2xl">
            <div class="flex flex-col items-center mb-10 text-center">
                <div class="bg-blue-600 p-5 rounded-3xl mb-6 shadow-xl shadow-blue-500/30">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                    </svg>
                </div>
                <h1 class="text-2xl font-black tracking-tight uppercase leading-tight">Sertifikat<br>Digital Workshop</h1>
                <p class="text-blue-300 mt-2 text-sm font-medium opacity-80">SMK N 8 Purworejo</p>
            </div>

            <div class="space-y-8">
                <div class="relative">
                    <label class="block text-[10px] font-black text-blue-400 uppercase tracking-[0.2em] mb-3 ml-1">Nama Lengkap & Gelar</label>
                    <input type="text" id="userName" placeholder="Contoh: Nama Anda, S.Pd." 
                           class="w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-5 text-white text-lg focus:ring-4 focus:ring-blue-500/20 focus:border-blue-500 outline-none transition-all placeholder:text-white/10 shadow-inner">
                </div>

                <button onclick="generateDownload()" 
                        class="w-full btn-gradient text-white font-bold py-5 rounded-2xl active:scale-95 flex items-center justify-center gap-3 text-lg uppercase tracking-widest shadow-lg">
                    <span>Unduh Sertifikat</span>
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a2 2 0 002 2h12a2 2 0 002-2v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                    </svg>
                </button>
            </div>
            
            <p class="text-center text-white/20 text-[10px] mt-10 uppercase tracking-[0.3em]">
                &copy; 2026 Komunitas Inspirasi Depan
            </p>
        </div>
    </div>

    <!-- Hidden Rendering Area (User won't see this) -->
    <div id="render-area">
        <div id="certificate-wrapper">
            <!-- Template Image -->
            <img src="https://images.unsplash.com/photo-1589330694653-ded6df03f754?q=80&w=2000&auto=format&fit=crop" 
                 alt="Template" class="canva-bg" id="template-img">
            
            <div class="content-layer">
                <div class="name-container">
                    <h2 id="display-name" class="cert-name">NAMA LENGKAP PESERTA</h2>
                </div>

                <!-- Barcode Section -->
                <div class="barcode-pos bg-white/90 p-2 rounded">
                    <svg viewBox="0 0 100 100" class="w-16 h-16 text-gray-900">
                        <rect x="10" y="10" width="22" height="22" fill="currentColor"/>
                        <rect x="68" y="10" width="22" height="22" fill="currentColor"/>
                        <rect x="10" y="68" width="22" height="22" fill="currentColor"/>
                        <rect x="42" y="42" width="16" height="16" fill="currentColor"/>
                        <rect x="65" y="65" width="10" height="10" fill="currentColor"/>
                        <rect x="80" y="80" width="10" height="10" fill="currentColor"/>
                    </svg>
                </div>
            </div>
        </div>
    </div>

    <script>
        const nameInput = document.getElementById('userName');
        const displayLabel = document.getElementById('display-name');

        async function generateDownload() {
            const name = nameInput.value.trim();
            if (!name) {
                alert("Harap masukkan nama lengkap Anda!");
                return;
            }

            // Update the hidden label before capture
            displayLabel.innerText = name.toUpperCase();

            const cert = document.getElementById('certificate-wrapper');
            
            // Render the hidden element
            html2canvas(cert, {
                scale: 2, 
                useCORS: true,
                allowTaint: true,
                backgroundColor: "#ffffff"
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = `Sertifikat_${name.replace(/\s+/g, '_')}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
            }).catch(err => {
                console.error("Rendering error:", err);
                alert("Gagal memproses gambar. Pastikan koneksi internet stabil.");
            });
        }
    </script>
</body>
</html>
